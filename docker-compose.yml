services:
  # ============================================
  # INFRASTRUCTURE LAYER
  # ============================================

  locallitix-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_MULTIPLE_DATABASES: locallitix_core,keycloak_db
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./core-backend/scripts/init-multiple-psql-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-psql-dbs.sh
    networks:
      - locallitix-net

  locallitix-keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    command: start-dev --import-realm
    volumes:
      - ./core-backend/scripts/realm-export.json:/opt/keycloak/data/import/realm-export.json
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://locallitix-postgres:5432/keycloak_db
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: supersecretpassword
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    depends_on:
      - locallitix-postgres
    networks:
      - locallitix-net

  locallitix-influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: supersecretpassword
      DOCKER_INFLUXDB_INIT_ORG: locallitix
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: locallitix-super-secret-token-123
    ports:
      - "8086:8086"
    volumes:
      - influx-data:/var/lib/influxdb2
    networks:
      - locallitix-net

  locallitix-backbone:
    image: nats:latest
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    networks:
      - locallitix-net

  locallitix-video:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "9997:9997"   # MediaMTX API (debug: curl localhost:9997/v3/paths/list)
    networks:
      - locallitix-net

  locallitix-minio:
    image: minio/minio:latest
    container_name: locallitix-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: komandan
      MINIO_ROOT_PASSWORD: supersecretpassword
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - locallitix-net

  # ============================================
  # APPLICATION LAYER
  # ============================================

  locallitix-core-api:
    build:
      context: ./core-backend
      dockerfile: Dockerfile
    depends_on:
      - locallitix-backbone
      - locallitix-postgres
      - locallitix-influxdb
      - locallitix-keycloak
      - locallitix-minio
    environment:
      - DB_DSN=host=locallitix-postgres user=root password=supersecretpassword dbname=locallitix_core port=5432 sslmode=disable
      - INFLUX_URL=http://locallitix-influxdb:8086
      - INFLUX_TOKEN=locallitix-super-secret-token-123
      - NATS_URL=nats://locallitix-backbone:4222
      - KEYCLOAK_URL=http://locallitix-keycloak:8080/realms/locallitix/protocol/openid-connect/certs
      - KEYCLOAK_TOKEN_URL=http://locallitix-keycloak:8080/realms/locallitix/protocol/openid-connect/token
      - KEYCLOAK_ADMIN_URL=http://locallitix-keycloak:8080/admin/realms/locallitix
      - KEYCLOAK_CLIENT_ID=chimp-platform
      - KEYCLOAK_ADMIN_USER=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - MINIO_ENDPOINT=locallitix-minio:9000
      - MINIO_ACCESS_KEY=komandan
      - MINIO_SECRET_KEY=supersecretpassword
      - COOKIE_DOMAIN=localhost
      - COOKIE_SECURE=false
      - CORS_ORIGIN=http://localhost:3000
      - DATALASTIC_API_KEY=${DATALASTIC_API_KEY}
      - ENABLE_DATALASTIC_API=${ENABLE_DATALASTIC_API:-false}
      - ADSB_API_KEY=${ADSB_API_KEY}
      - ENABLE_ADSB_API=${ENABLE_ADSB_API:-false}
      - DRONE_MODE=${DRONE_MODE:-virtual}                # real = live drone, virtual = simulation
      - DISABLE_DRONE_SIM=${DISABLE_DRONE_SIM:-false}   # set true in .env to suppress simulator
    ports:
      - "8080:8080"
    volumes:
      - ./mariview-frontend/public/assets/drone.mp4:/app/drone.mp4:ro
      - recordings-data:/recordings   # read AI-annotated MP4s for MinIO upload
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - locallitix-net

  locallitix-ui:
    build:
      context: ./mariview-frontend
      dockerfile: Dockerfile
    depends_on:
      - locallitix-core-api
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - locallitix-net

  # ============================================
  # AI / VISION LAYER
  # ============================================

  locallitix-ai-vision:
    build:
      context: ./workers/vision
      dockerfile: Dockerfile
    depends_on:
      - locallitix-backbone
      - locallitix-video
    env_file:
      - .env
    volumes:
      - ./mariview-frontend/public/assets/drone.mp4:/app/videos/drone.mp4:ro
      - recordings-data:/recordings   # write AI-annotated MP4s here
      - hf-cache:/root/.cache/huggingface  # persist CLIP/YOLO model cache across restarts
    environment:
      - NATS_URL=nats://locallitix-backbone:4222
      - MEDIAMTX_RTSP_URL=rtsp://locallitix-video:8554/drone-cam
      - VIDEO_PATH=/app/videos/drone.mp4
      - YOLO_MODEL=yolov8n.pt
      - YOLO_CONF=0.35
    restart: unless-stopped
    networks:
      - locallitix-net

  # ============================================
  # MAVLink → NATS TELEMETRY BRIDGE (real drone only)
  # Start: docker compose --profile real up -d locallitix-telemetry-bridge
  # ============================================

  locallitix-telemetry-bridge:
    build:
      context: ./workers/vision
      dockerfile: Dockerfile
    command: ["python", "real_telemetry_bridge.py"]
    depends_on:
      - locallitix-backbone
    env_file:
      - .env
    environment:
      - NATS_URL=nats://locallitix-backbone:4222
    ports:
      - "14550:14550/udp"   # MAVLink UDP — mavlink_injector / GCS directs here
    restart: unless-stopped
    # Remove profiles: so this starts automatically when DRONE_MODE=real
    # To start: docker compose up -d locallitix-telemetry-bridge
    profiles:
      - real                 # still gated; start with: docker compose --profile real up -d
    networks:
      - locallitix-net

networks:
  locallitix-net:
    driver: bridge

volumes:
  nats-data:
  pg-data:
  influx-data:
  minio-data:
  recordings-data:  # Shared between ai-vision (writer) and core-api (reader/uploader)
  hf-cache:         # HuggingFace model cache — prevents re-download of CLIP (600MB) on restart
